<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- Icon (Cross + Check) -->
  <g transform="translate(20,20)">
    <rect x="20" y="0" width="20" height="60" fill="url(#grad1)" rx="5"></rect>
    <rect x="0" y="20" width="60" height="20" fill="url(#grad1)" rx="5"></rect>
    
    <!-- Check mark -->
    <path d="M10 35 L25 50 L50 15" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
  </g>

  <!-- Text -->
  <text x="100" y="60" font-family="Arial, sans-serif" font-size="36" fill="url(#grad1)" font-weight="bold">
    Appointiva
  </text>

  <!-- Tagline -->
  <text x="100" y="85" font-family="Arial, sans-serif" font-size="14" fill="#555">
    Doctor Appointment System
  </text>
</svg>